<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0b0b0f" />
  <title>Kadr Media · Dashboard</title>
  <link rel="icon" type="image/png" href="logo.png" />
  <link rel="apple-touch-icon" href="logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- ===== LOGIN ===== -->
  <div id="login" class="login-screen">
    <div class="login-card">
      <img class="login-logo-img" src="logo.png" alt="Kadr Media" />
      <p class="login-sub">Content Production Dashboard</p>
      <p class="login-hint">Kim sifatida kirasiz?</p>
      <div id="loginUsers" class="login-users"></div>
    </div>
  </div>

  <!-- ===== APP ===== -->
  <div id="app" class="app hidden">

    <!-- Sidebar (desktop) / Topbar -->
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-logo"></div>
        <div>
          <div class="brand-name">Kadr Media</div>
          <div class="brand-sub">Production OS</div>
        </div>
      </div>

      <nav class="nav">
        <button class="nav-btn active" data-view="dashboard">
          <span class="ic">▦</span> Boshqaruv paneli
        </button>
        <button class="nav-btn" data-view="projects">
          <span class="ic">▣</span> Loyihalar
        </button>
        <button class="nav-btn" data-view="team">
          <span class="ic">◍</span> Jamoa yuklamasi
        </button>
        <button class="nav-btn ceo-only" data-view="ceo">
          <span class="ic">★</span> CEO ko'rinishi
        </button>
      </nav>

      <div class="sidebar-foot">
        <div class="me">
          <div class="me-avatar" id="meAvatar">?</div>
          <div class="me-info">
            <div class="me-name" id="meName">—</div>
            <div class="me-role" id="meRole">—</div>
          </div>
        </div>
        <button class="logout-btn" id="logoutBtn">Chiqish</button>
      </div>
    </aside>

    <!-- Main -->
    <main class="main">
      <header class="topbar">
        <div>
          <h2 id="viewTitle">Boshqaruv paneli</h2>
          <p id="viewSub" class="muted">Bugungi holat — bir qarashda</p>
        </div>
        <div class="topbar-actions">
          <div class="search-box">
            <span>⌕</span>
            <input id="searchInput" type="text" placeholder="Loyiha qidirish..." />
          </div>
          <button class="btn-primary" id="addBtn">+ Loyiha</button>
        </div>
      </header>

      <div class="content" id="content"></div>
    </main>

    <!-- Mobile bottom nav -->
    <nav class="mobile-nav">
      <button class="m-btn active" data-view="dashboard"><span>▦</span>Panel</button>
      <button class="m-btn" data-view="projects"><span>▣</span>Loyihalar</button>
      <button class="m-btn" data-view="team"><span>◍</span>Jamoa</button>
      <button class="m-btn ceo-only" data-view="ceo"><span>★</span>CEO</button>
    </nav>
  </div>

  <!-- ===== MODAL ===== -->
  <div id="modal" class="modal-overlay hidden">
    <div class="modal">
      <div class="modal-head">
        <h3 id="modalTitle">Loyiha</h3>
        <button class="modal-close" id="modalClose">✕</button>
      </div>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script src="app.js"></script>
</body>
</html>
