<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0b0b0f" />
  <title>Kadr Media · Dashboard</title>
  <link rel="icon" type="image/png" href="logo.png" />
  <link rel="apple-touch-icon" href="logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- ===== LOGIN ===== -->
  <div id="login" class="login-screen">
    <div class="login-card">
      <img class="login-logo-img" src="logo.png" alt="Kadr Media" />
      <p class="login-sub">Content Production Dashboard</p>
      <form id="loginForm" class="login-form" autocomplete="on">
        <div class="field">
          <label>Login</label>
          <input id="loginUser" type="text" placeholder="masalan: said" autocapitalize="none" autocomplete="username" />
        </div>
        <div class="field">
          <label>Parol</label>
          <input id="loginPass" type="password" placeholder="••••••" autocomplete="current-password" />
        </div>
        <div id="loginError" class="login-err hidden"></div>
        <button type="submit" class="btn-save" id="loginBtn">Kirish</button>
      </form>
    </div>
  </div>

  <!-- ===== APP ===== -->
  <div id="app" class="app hidden">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-logo"></div>
        <div>
          <div class="brand-name">Kadr Media</div>
          <div class="brand-sub">Production OS</div>
        </div>
      </div>
      <nav class="nav" id="navMenu"></nav>
      <div class="sidebar-foot">
        <div class="me" id="meBox">
          <div class="me-avatar" id="meAvatar">?</div>
          <div class="me-info">
            <div class="me-name" id="meName">—</div>
            <div class="me-role" id="meRole">—</div>
          </div>
        </div>
        <button class="logout-btn" id="logoutBtn">Chiqish</button>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div class="topbar-left">
          <div class="topbar-logo"></div>
          <div>
            <h2 id="viewTitle">—</h2>
            <p id="viewSub" class="muted">—</p>
          </div>
        </div>
        <div class="topbar-actions" id="topbarActions"></div>
      </header>
      <div class="content" id="content"></div>
    </main>

    <nav class="mobile-nav" id="mobileNav"></nav>
  </div>

  <!-- ===== MODAL ===== -->
  <div id="modal" class="modal-overlay hidden">
    <div class="modal">
      <div class="modal-head">
        <h3 id="modalTitle">—</h3>
        <button class="modal-close" id="modalClose">✕</button>
      </div>
      <div class="modal-body" id="modalBody"></div>
    </div>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script src="app.js"></script>
</body>
</html>
